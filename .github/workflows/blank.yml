name: Unzip and Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Giải nén file code của bạn
      - name: Unzip project files
        run: |
          unzip -o project.zip
          rm -f project.zip

      # 2. Cài đặt Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Tự động sinh ra các file Gradle bị thiếu ở thư mục gốc
      - name: Generate missing Gradle wrapper and root files
        run: |
          # Cài đặt công cụ Gradle trên máy chủ
          sudo apt-get update && sudo apt-get install -y gradle
          
          # Tự tạo file build.gradle.kts ở thư mục gốc nếu chưa có
          if [ ! -f "build.gradle.kts" ]; then
            echo '// Top-level build file' > build.gradle.kts
            echo 'plugins {' >> build.gradle.kts
            echo '    alias(libs.plugins.android.application) apply false' >> build.gradle.kts
            echo '    alias(libs.plugins.kotlin.android) apply false' >> build.gradle.kts
            echo '}' >> build.gradle.kts
          fi
          
          # Khởi tạo Gradle Wrapper hoàn chỉnh (sinh ra gradlew và thư mục gradle/)
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # 4. Tiến hành build APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Tải file APK lên để bạn tải về
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
