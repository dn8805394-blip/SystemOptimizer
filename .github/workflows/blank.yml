name: Unzip and Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Giải nén và liệt kê toàn bộ cấu trúc file ra màn hình
      - name: Unzip and List Files
        run: |
          unzip -o project.zip
          echo "=== DANH SÁCH FILE SAU KHI GIẢI NÉN ==="
          find . -maxdepth 3
          echo "========================================"
