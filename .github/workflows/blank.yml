name: Unzip and Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Giải nén file code của bạn
      - name: Unzip project files
        run: |
          unzip -o project.zip
          rm -f project.zip

      # 2. Cài đặt Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Tự động sinh ra các file Gradle bị thiếu ở thư mục gốc (không dùng libs)
      - name: Generate missing Gradle wrapper and root files
        run: |
          # Cài đặt công cụ Gradle trên máy chủ
          sudo apt-get update && sudo apt-get install -y gradle
          
          # Tự tạo file build.gradle.kts ở thư mục gốc nếu chưa có (dùng phiên bản trực tiếp)
          if [ ! -f "build.gradle.kts" ]; then
            cat <<EOF > build.gradle.kts
            // Top-level build file
            plugins {
                id("com.android.application") version "8.1.1" apply false
                id("org.jetbrains.kotlin.android") version "1.9.0" apply false
            }
            EOF
          fi
          
          # Khởi tạo Gradle Wrapper hoàn chỉnh (sinh ra gradlew và thư mục gradle/)
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # 4. Tiến hành build APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Tải file APK lên để bạn tải về
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
